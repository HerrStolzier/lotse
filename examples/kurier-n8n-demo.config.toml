# Copy this file to a temporary path, replace PI_HOST, and use it for the demo only.
# Do not store real secrets in this file.

[llm]
provider = "ollama"
model = "qwen2.5:7b"
base_url = "http://localhost:11434"
temperature = 0.1

[embeddings]
model = "BAAI/bge-small-en-v1.5"

[database]
path = "/tmp/kurier-n8n-demo/kurier.db"

inbox_dir = "/tmp/kurier-n8n-demo/inbox"
review_dir = "/tmp/kurier-n8n-demo/review"

[routes.n8n_demo]
type = "webhook"
url = "http://PI_HOST:5678/webhook/kurier-demo"
categories = ["rechnung", "artikel", "notiz"]
confidence_threshold = 0.5
